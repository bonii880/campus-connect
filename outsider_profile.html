<script type="module">
import { auth, db, storage } from './firebase.js';
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
import { doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";
import { ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-storage.js";

let currentUser = null;

onAuthStateChanged(auth, user => {
  if (!user) {
    window.location.href = 'login.html';
  } else {
    currentUser = user;
  }
});

const profilePicEl = document.getElementById('profilePic');
const avatarPreview = document.getElementById('avatarPreview');

profilePicEl.addEventListener('change', e => {
  const f = e.target.files[0];
  if (f) avatarPreview.src = URL.createObjectURL(f);
});

const saveBtn = document.getElementById('saveBtn');
const savingEl = document.getElementById('saving');

saveBtn.addEventListener('click', async () => {

  if (!currentUser) return;

  saveBtn.disabled = true;
  savingEl.style.display = 'block';

  let imageUrl = "";

  try {
    const file = profilePicEl.files[0];

    // 🔥 SAFE UPLOAD (won’t freeze app)
    if (file) {
      try {
        const storageRef = ref(storage, `profiles/${currentUser.uid}/profile.jpg`);
        await uploadBytes(storageRef, file);
        imageUrl = await getDownloadURL(storageRef);
      } catch (uploadError) {
        console.warn("Image upload failed, continuing without image", uploadError);
      }
    }

    const data = {
      uid: currentUser.uid,
      name: document.getElementById("name").value,
      nickname: document.getElementById("nickname").value,
      county: document.getElementById("county").value,
      age: Number(document.getElementById("age").value),
      occupation: document.getElementById("occupation").value,
      matchWith: document.getElementById("matchWith").value,
      prefCounty: document.getElementById("prefCounty").value,
      prefAgeRange: document.getElementById("prefAgeRange").value,
      profilePic: imageUrl,
      userType: "outsider",
      createdAt: serverTimestamp()
    };

    await setDoc(doc(db, 'users', currentUser.uid), data);

    // ✅ FORCE REDIRECT (NO DELAY, NO BLOCK)
    window.location.href = "home.html";

  } catch (err) {
    console.error(err);
    alert("Error saving profile");
    saveBtn.disabled = false;
    savingEl.style.display = 'none';
  }

});
</script>
