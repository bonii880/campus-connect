<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Outsider Profile — CampusConnect</title>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg1:#2a0820; --bg2:#12000b;
      --pink1:#ff69b4; --pink2:#ff1493;
      --card: rgba(255,255,255,0.06); --muted:#f3c0d6;
    }

    body{
      margin:0;
      font-family:Inter, Poppins;
      background: linear-gradient(135deg,var(--bg1),var(--bg2));
      color:white;
      display:flex;
      justify-content:center;
      padding:28px;
    }

    .wrap{max-width:760px;width:100%}

    .card{
      background:var(--card);
      padding:24px;
      border-radius:18px;
    }

    h1{
      font-family:'Great Vibes';
      color:var(--pink2);
    }

    input, select{
      width:100%;
      padding:10px;
      margin-top:10px;
      border-radius:10px;
      border:none;
      background:rgba(255,255,255,0.05);
      color:white;
    }

    .chips{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-top:10px;
    }

    .chip{
      padding:8px 12px;
      border-radius:999px;
      background:rgba(255,255,255,0.05);
      cursor:pointer;
    }

    .chip.active{
      background:linear-gradient(90deg,var(--pink1),var(--pink2));
    }

    .btn{
      margin-top:20px;
      width:100%;
      padding:14px;
      border:none;
      border-radius:14px;
      background:linear-gradient(90deg,var(--pink1),var(--pink2));
      color:white;
      font-weight:bold;
    }

    .error{color:#ffb3c7;margin-top:10px;display:none}
  </style>
</head>

<body>

<div class="wrap">
<div class="card">

<h1>Outsider Profile</h1>

<input id="name" placeholder="Full name">
<input id="nickname" placeholder="Nickname">
<input id="county" placeholder="County">
<input id="age" type="number" placeholder="Age">
<input id="occupation" placeholder="Occupation">

<div class="chips">
  <div class="chip" data-value="Mubaba">Mubaba</div>
  <div class="chip" data-value="Mumama">Mumama</div>
  <div class="chip" data-value="Casual">Casual</div>
</div>

<select id="matchWith">
  <option value="">Match Preference</option>
  <option value="Student">Student</option>
  <option value="Outsider">Outsider</option>
</select>

<input id="prefCounty" placeholder="Preferred County">
<input id="prefAgeRange" placeholder="Preferred Age Range">

<div id="error" class="error"></div>

<button id="saveBtn" class="btn">Save Profile</button>

</div>
</div>

<script type="module">
import { auth, db } from './firebase.js';
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
import { doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

let currentUser = null;

onAuthStateChanged(auth, user => {
  if (!user) {
    window.location.href = 'login.html';
  } else {
    currentUser = user;
  }
});

const chips = document.querySelectorAll('.chip');
const selectedLooking = new Set();

chips.forEach(chip => {
  chip.addEventListener('click', () => {
    const v = chip.dataset.value;

    if (selectedLooking.has(v)) {
      selectedLooking.delete(v);
      chip.classList.remove('active');
    } else {
      selectedLooking.add(v);
      chip.classList.add('active');
    }
  });
});

const saveBtn = document.getElementById('saveBtn');
const errorEl = document.getElementById('error');

saveBtn.addEventListener('click', async () => {

  errorEl.style.display = "none";

  try {

    if (!currentUser) throw new Error("Not logged in");

    const name = name.value.trim();
    const nickname = nickname.value.trim();
    const county = county.value.trim();
    const age = age.value;
    const occupation = occupation.value.trim();
    const matchWith = matchWith.value;
    const prefCounty = prefCounty.value.trim();
    const prefAge = prefAgeRange.value.trim();

    if (!name || !nickname || !county || !age || !occupation) {
      throw new Error("Fill all fields");
    }

    if (selectedLooking.size === 0) {
      throw new Error("Select what you are looking for");
    }

    const data = {
      uid: currentUser.uid,
      name,
      nickname,
      county,
      age,
      occupation,
      lookingFor: Array.from(selectedLooking),
      matchWith,
      prefCounty,
      prefAge,
      createdAt: serverTimestamp()
    };

    await setDoc(doc(db, "outsiders", currentUser.uid), data);

    // ✅ FIXED: NOW IT MOVES FORWARD
    window.location.href = "home.html";

  } catch (err) {
    errorEl.innerText = err.message;
    errorEl.style.display = "block";
  }

});
</script>

</body>
</html>
