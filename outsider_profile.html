<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Outsider Profile — CampusConnect</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#2a0820,#12000b);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  width:100%;
  max-width:400px;
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:15px;
  text-align:center;
}

h2{
  color:#ff1493;
}

input, select{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:none;
  outline:none;
}

button{
  margin-top:15px;
  padding:12px;
  width:100%;
  background:#ff1493;
  border:none;
  color:white;
  font-weight:bold;
  border-radius:10px;
  cursor:pointer;
}

img{
  width:120px;
  height:120px;
  border-radius:50%;
  object-fit:cover;
}

#status{
  margin-top:10px;
  font-size:14px;
}
</style>
</head>

<body>

<div class="container">

<h2>Outsider Profile</h2>

<img id="preview" src="https://via.placeholder.com/150"><br><br>

<input type="file" id="photo">

<input id="name" placeholder="Full Name">
<input id="nickname" placeholder="Nickname">
<input id="county" placeholder="County">
<input id="age" type="number" placeholder="Age">
<input id="occupation" placeholder="Occupation">

<select id="matchWith">
<option value="">Match With</option>
<option value="Student">Student</option>
<option value="Outsider">Outsider</option>
<option value="Both">Both</option>
</select>

<input id="prefCounty" placeholder="Preferred County">
<input id="prefAge" placeholder="Preferred Age Range (e.g 18-28)">

<button id="saveBtn">Save Profile</button>

<p id="status"></p>

</div>

<script type="module">
import { auth, db, storage } from './firebase.js';
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
import { doc, setDoc } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";
import { ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-storage.js";

let currentUser = null;

onAuthStateChanged(auth, (user)=>{
  if(!user){
    window.location.href = "login.html";
  }else{
    currentUser = user;
  }
});

// Image preview
const photo = document.getElementById("photo");
const preview = document.getElementById("preview");

photo.addEventListener("change", ()=>{
  const file = photo.files[0];
  if(file){
    preview.src = URL.createObjectURL(file);
  }
});

// Save profile
document.getElementById("saveBtn").addEventListener("click", async ()=>{

  if(!currentUser){
    alert("User not logged in");
    return;
  }

  const status = document.getElementById("status");
  status.innerText = "Saving profile...";

  try{

    let imageUrl = "";

    const file = photo.files[0];
    if(file){
      const storageRef = ref(storage, "profiles/"+currentUser.uid);
      await uploadBytes(storageRef, file);
      imageUrl = await getDownloadURL(storageRef);
    }

    const data = {
      uid: currentUser.uid,
      name: document.getElementById("name").value,
      nickname: document.getElementById("nickname").value,
      county: document.getElementById("county").value,
      age: Number(document.getElementById("age").value),
      occupation: document.getElementById("occupation").value,
      matchWith: document.getElementById("matchWith").value,
      prefCounty: document.getElementById("prefCounty").value,
      prefAge: document.getElementById("prefAge").value,
      profilePic: imageUrl,
      userType: "outsider"
    };

    // ✅ FIXED: Save to USERS collection
    await setDoc(doc(db, "users", currentUser.uid), data);

    status.innerText = "Saved successfully! Redirecting...";

    setTimeout(()=>{
      window.location.href = "home.html";
    },1000);

  }catch(error){
    console.error(error);
    status.innerText = "Error saving profile!";
  }

});
</script>

</body>
</html>
