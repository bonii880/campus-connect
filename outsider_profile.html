<script type="module">
import { auth, db, storage } from './firebase.js';
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
import { doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";
import { ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-storage.js";

// ELEMENTS
const profilePicEl = document.getElementById('profilePic');
const avatarPreview = document.getElementById('avatarPreview');
const chips = document.querySelectorAll('.chip');
const saveBtn = document.getElementById('saveBtn');
const savingEl = document.getElementById('saving');
const errorEl = document.getElementById('error');

// STATE
let currentUser = null;
const selectedLooking = new Set();

// AUTH
onAuthStateChanged(auth, user => {
  if (!user) {
    window.location.href = 'login.html';
  } else {
    currentUser = user;
  }
});

// CHIP SELECT
chips.forEach(chip => {
  chip.addEventListener('click', () => {
    const value = chip.dataset.value;

    if (selectedLooking.has(value)) {
      selectedLooking.delete(value);
      chip.classList.remove('active');
    } else {
      selectedLooking.add(value);
      chip.classList.add('active');
    }
  });
});

// IMAGE PREVIEW
profilePicEl.addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;

  if (file.size > 2 * 1024 * 1024) {
    alert("Image must be under 2MB");
    profilePicEl.value = "";
    return;
  }

  avatarPreview.src = URL.createObjectURL(file);
});

// SAVE PROFILE
saveBtn.addEventListener('click', async () => {

  if (!currentUser) return;

  errorEl.style.display = "none";
  savingEl.style.display = "block";
  saveBtn.disabled = true;

  try {

    // GET VALUES
    const name = document.getElementById('name').value.trim();
    const nickname = document.getElementById('nickname').value.trim();
    const county = document.getElementById('county').value.trim();
    const age = document.getElementById('age').value;
    const occupation = document.getElementById('occupation').value.trim();
    const matchWith = document.getElementById('matchWith').value;
    const prefCounty = document.getElementById('prefCounty').value.trim();
    const prefAge = document.getElementById('prefAgeRange').value.trim();

    // VALIDATION
    if (!name || !nickname || !county || !age || !occupation) {
      throw new Error("Fill all required fields");
    }

    if (selectedLooking.size === 0) {
      throw new Error("Select what you are looking for");
    }

    // IMAGE UPLOAD
    let imageUrl = "";

    const file = profilePicEl.files[0];

    if (file) {
      const storageRef = ref(storage, `profiles/${currentUser.uid}/profile.jpg`);
      await uploadBytes(storageRef, file);
      imageUrl = await getDownloadURL(storageRef);
    }

    // DATA OBJECT
    const data = {
      uid: currentUser.uid,
      email: currentUser.email || "",
      name,
      nickname,
      county,
      age: Number(age),
      occupation,
      lookingFor: Array.from(selectedLooking),

      match: {
        type: matchWith,
        county: prefCounty,
        ageRange: prefAge
      },

      profilePic: imageUrl,
      userType: "outsider",
      createdAt: serverTimestamp()
    };

    // SAVE TO FIRESTORE
    await setDoc(doc(db, "outsiders", currentUser.uid), data);

    // SUCCESS
    savingEl.innerText = "Saved ✅ Redirecting...";
    setTimeout(() => {
      window.location.href = "home.html";
    }, 800);

  } catch (err) {
    console.error(err);
    errorEl.innerText = err.message;
    errorEl.style.display = "block";
  }

  saveBtn.disabled = false;
  savingEl.style.display = "none";
});
</script>
