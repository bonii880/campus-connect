<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Outsider Profile — CampusConnect</title>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg1:#2a0820; --bg2:#12000b;
      --pink1:#ff69b4; --pink2:#ff1493;
      --card: rgba(255,255,255,0.06); --muted:#f3c0d6;
    }
    *{box-sizing:border-box}
    body{
      margin:0; min-height:100vh; font-family:Inter, Poppins, system-ui;
      background: linear-gradient(135deg,var(--bg1),var(--bg2));
      color:#fff; display:flex; justify-content:center; padding:28px;
    }

    .wrap{width:100%; max-width:760px}
    .card{
      background:var(--card); border-radius:18px; padding:24px;
      box-shadow:0 8px 40px rgba(0,0,0,0.45); border: 1px solid rgba(255,20,147,0.06);
      backdrop-filter: blur(6px);
    }
    h1{font-family:'Great Vibes',cursive;color:var(--pink2);font-size:38px;margin:0}
    p.lead{color:var(--muted);margin:6px 0 18px}

    .grid{display:grid; grid-template-columns:150px 1fr; gap:18px; align-items:start;}
    @media (max-width:720px){ .grid{grid-template-columns: 1fr} }

    label{display:block;margin-top:12px;color:#ffd6ea;font-weight:600}
    input[type="text"],input[type="number"],select{
      width:100%; padding:10px 12px; border-radius:10px;border:none;background:rgba(255,255,255,0.04); color:#fff;
      font-size:15px; outline:none;
    }

    .row{display:flex;gap:12px}
    .col{flex:1}

    .chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
    .chip{padding:8px 12px;border-radius:999px;background:rgba(255,255,255,0.04);cursor:pointer;border:1px solid rgba(255,255,255,0.03);}
    .chip.active{ background: linear-gradient(90deg,var(--pink1),var(--pink2)); color:#fff; }

    .btn{
      width:100%; padding:14px; border-radius:14px;border:none; cursor:pointer;
      background: linear-gradient(90deg,var(--pink1),var(--pink2)); color:white; font-weight:700; font-size:16px;margin-top:18px;
    }

    .note{font-size:13px;color:#ffd6ea;margin-top:8px}
    .error{color:#ffb3c7;font-weight:700;margin-top:10px;display:none}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Outsider Profile</h1>
      <p class="lead">Create your profile — matches will see your nickname. Fill honestly for better matches.</p>

      <div class="grid">
        <div></div>

        <div>
          <label>Full name *</label>
          <input id="name" type="text">

          <label>Nickname *</label>
          <input id="nickname" type="text">

          <div class="row">
            <div class="col">
              <label>County *</label>
              <input id="county" type="text">
            </div>
            <div class="col">
              <label>Age *</label>
              <input id="age" type="number">
            </div>
          </div>

          <label>Occupation *</label>
          <input id="occupation" type="text">

          <label>What are you looking for?</label>
          <div class="chips">
            <div class="chip">Casual</div>
            <div class="chip">Relationship</div>
            <div class="chip">FWB</div>
          </div>

          <label>Match Preference</label>
          <select id="matchWith">
            <option value="">Select</option>
            <option value="Student">Student</option>
            <option value="Outsider">Outsider</option>
          </select>

          <label>Preferred County</label>
          <input id="prefCounty" type="text">

          <label>Preferred Age Range</label>
          <input id="prefAgeRange" type="text">

          <div id="error" class="error"></div>
          <button id="saveBtn" class="btn">Save Profile</button>
          <div id="saving" class="note" style="display:none">Saving profile…</div>
        </div>
      </div>
    </div>
  </div>

<script type="module">
import { auth, db } from './firebase.js';
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
import { doc, setDoc } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

const saveBtn = document.getElementById('saveBtn');
const errorEl = document.getElementById('error');
const savingEl = document.getElementById('saving');

let currentUser = null;

onAuthStateChanged(auth, user => {
  if (!user) {
    alert('Login first');
    window.location.href = 'login.html';
  } else {
    currentUser = user;
  }
});

saveBtn.addEventListener('click', async () => {
  if (!currentUser) return alert('Not logged in');

  saveBtn.disabled = true;
  savingEl.style.display = 'block';

  try {
    await setDoc(doc(db, 'users', currentUser.uid), {
      name: document.getElementById('name').value,
      nickname: document.getElementById('nickname').value,
      county: document.getElementById('county').value,
      age: document.getElementById('age').value,
      occupation: document.getElementById('occupation').value,
      matchWith: document.getElementById('matchWith').value,
      prefCounty: document.getElementById('prefCounty').value,
      prefAge: document.getElementById('prefAgeRange').value
    });

    window.location.href = 'home.html';

  } catch (err) {
    console.error(err);
    errorEl.textContent = err.message;
    errorEl.style.display = 'block';
  }

  saveBtn.disabled = false;
  savingEl.style.display = 'none';
});
</script>
</body>
</html>
